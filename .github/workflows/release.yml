name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - uses: docker/setup-buildx-action@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install buf
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/download/v1.64.0/buf-Linux-x86_64.tar.gz \
            | sudo tar -xzf - -C /usr/local --strip-components=1 buf/bin/buf

      - name: Install protoc plugins
        env:
          GOBIN: ${{ github.workspace }}/bin
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.34.2
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.5.1

      - name: Add GOBIN to PATH
        run: echo "${{ github.workspace }}/bin" >> "$GITHUB_PATH"

      - name: Set release version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate protobuf stubs
        run: |
          buf export buf.build/agynio/api --output internal/.proto
          buf generate internal/.proto --template ./buf.gen.yaml

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: go build ./...

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release images
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/agynio/token-counting:${{ github.ref_name }}
            ghcr.io/agynio/token-counting:latest
            ghcr.io/agynio/token-counting:${{ github.sha }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        run: |
          helm package charts/token-counting --version "${VERSION}" --app-version "${VERSION}"

      - name: Push Helm chart to GHCR
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          helm registry login ghcr.io --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}
          helm push token-counting-${VERSION}.tgz oci://ghcr.io/agynio/charts
