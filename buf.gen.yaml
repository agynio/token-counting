version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: .gen/go
    opt:
      - paths=source_relative
      - Magynio/api/token_counting/v1/token_counting.proto=github.com/agynio/token-counting/.gen/go/agynio/api/token_counting/v1
  - remote: buf.build/grpc/go
    out: .gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
      - Magynio/api/token_counting/v1/token_counting.proto=github.com/agynio/token-counting/.gen/go/agynio/api/token_counting/v1
